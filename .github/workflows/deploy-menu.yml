name: Deploy menu branch

on:
  push:
    branches:
      - menu

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PROJECT_PATH }}"

            git fetch origin menu
            git checkout menu
            git reset --hard origin/menu

            docker compose build
            docker compose up -d

            docker compose exec -T backend python manage.py migrate
            docker compose restart backend matchmaking_worker
            docker compose ps
